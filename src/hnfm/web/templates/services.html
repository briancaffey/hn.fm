{% extends "base.html" %}

{% block title %}Services - hn.fm{% endblock %}

{% block content %}
<div class="px-4 sm:px-6 lg:px-8">
    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Services Status</h1>
        <p class="mt-2 text-gray-600">Monitor the health and availability of all pipeline services.</p>
    </div>

    <!-- Overall Status -->
    <div class="mb-8">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-medium text-gray-900">Overall Status</h2>
                    <p class="text-sm text-gray-500">Last checked: <span id="last-checked">-</span></p>
                </div>
                <div class="flex items-center space-x-3">
                    <div id="overall-status-indicator" class="w-4 h-4 rounded-full"></div>
                    <span id="overall-status-text" class="text-lg font-medium">Checking...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Services Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="services-grid">
        <!-- Services will be populated here -->
    </div>

    <!-- Refresh Button -->
    <div class="mt-8 text-center">
        <button id="refresh-services-btn" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            <i class="fas fa-sync-alt mr-2"></i>
            Refresh Services
        </button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize services page
    loadServicesStatus();

    // Set up event listeners
    document.getElementById('refresh-services-btn').addEventListener('click', loadServicesStatus);

    // Auto-refresh every 30 seconds
    setInterval(loadServicesStatus, 30000);
});

async function loadServicesStatus() {
    try {
        const response = await fetch('/api/services/status');
        const data = await response.json();

        updateOverallStatus(data.all_healthy, data.timestamp);
        updateServicesGrid(data.services);

    } catch (error) {
        console.error('Failed to load services status:', error);
        updateOverallStatus(false, new Date());
        showError('Failed to load services status. Please try again.');
    }
}

function updateOverallStatus(allHealthy, timestamp) {
    const indicator = document.getElementById('overall-status-indicator');
    const text = document.getElementById('overall-status-text');
    const lastChecked = document.getElementById('last-checked');

    if (allHealthy) {
        indicator.className = 'w-4 h-4 bg-green-500 rounded-full';
        text.textContent = 'All Services Healthy';
        text.className = 'text-lg font-medium text-green-600';
    } else {
        indicator.className = 'w-4 h-4 bg-red-500 rounded-full';
        text.textContent = 'Some Services Unhealthy';
        text.className = 'text-lg font-medium text-red-600';
    }

    lastChecked.textContent = new Date(timestamp).toLocaleString();
}

function updateServicesGrid(services) {
    const grid = document.getElementById('services-grid');

    grid.innerHTML = services.map(service => `
        <div class="bg-white rounded-lg shadow p-6 service-card">
            <div class="flex items-start justify-between">
                <div class="flex-1 details-container">
                    <div class="flex items-center space-x-3 mb-3">
                        <div class="service-status-indicator ${getStatusColor(service.status)}"></div>
                        <h3 class="text-lg font-medium text-gray-900">${service.name}</h3>
                    </div>

                    <div class="space-y-2 text-sm text-gray-600">
                        <div>
                            <span class="font-medium">URL:</span>
                            <span class="font-mono url-text">${service.url}</span>
                        </div>

                        <div>
                            <span class="font-medium">Status:</span>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusBadgeClass(service.status)}">
                                ${service.status}
                            </span>
                        </div>

                        <div>
                            <span class="font-medium">Response Time:</span>
                            <span>${service.response_time.toFixed(3)}s</span>
                        </div>

                        ${service.details ? `
                        <div>
                            <span class="font-medium">Details:</span>
                            <div class="mt-1 text-xs bg-gray-50 p-2 rounded">
                                <pre class="content-display text-xs text-gray-700">${formatDetails(service.details)}</pre>
                            </div>
                        </div>
                        ` : ''}

                        ${service.error_message ? `
                        <div>
                            <span class="font-medium text-red-600">Error:</span>
                            <div class="mt-1 text-xs text-red-600 bg-red-50 p-2 rounded">
                                <pre class="content-display text-xs text-red-700">${service.error_message}</pre>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function getStatusColor(status) {
    const colors = {
        'online': 'service-status-online',
        'offline': 'service-status-offline',
        'error': 'service-status-error'
    };
    return colors[status] || 'bg-gray-500';
}

function getStatusBadgeClass(status) {
    const classes = {
        'online': 'bg-green-100 text-green-800',
        'offline': 'bg-red-100 text-red-800',
        'error': 'bg-yellow-100 text-yellow-800'
    };
    return classes[status] || 'bg-gray-100 text-gray-800';
}

function formatDetails(details) {
    if (typeof details === 'object') {
        try {
            // Try to format as JSON for better readability
            return JSON.stringify(details, null, 2);
        } catch (e) {
            // Fallback to simple key-value format
            return Object.entries(details)
                .map(([key, value]) => `${key}: ${value}`)
                .join('\n');
        }
    }
    return String(details);
}

function showError(message) {
    // Simple error display - you can enhance this with a proper toast library
    alert(message);
}
</script>
{% endblock %}
