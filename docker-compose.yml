# Docker Compose configuration for hn.fm development
# Includes hot reloading and auto-reload functionality

# Define reusable service configurations using anchors
x-common-app-config: &common-app-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./src:/app/src  # Mount source code for hot reloading
    - ./outputs:/app/outputs
    - ./cache:/app/cache
    - ./voices:/app/voices  # Mount voice samples for TTS
    - ./htmlcov:/app/htmlcov  # Mount coverage reports for easy access
    - ./config.yaml:/app/config.yaml:ro
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - hnfm-network

# Define common environment variables
x-common-env: &common-env
  # Python and Debug
  PYTHONPATH: /app/src
  DEBUG: "true"
  LOG_LEVEL: DEBUG
  # Redis Configuration
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  # API Keys
  FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  # TTS Service Configuration
  TTS_BASE_URL: ${TTS_BASE_URL:-http://localhost:7860}
  TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-notebooklm}
  TTS_TIMEOUT_SECONDS: ${TTS_TIMEOUT_SECONDS:-120}
  # Studio Voice Configuration
  STUDIO_VOICE_TARGET: ${STUDIO_VOICE_TARGET:-localhost:8001}
  STUDIO_VOICE_MODEL_TYPE: ${STUDIO_VOICE_MODEL_TYPE:-48k-hq}
  STUDIO_VOICE_HTTP_HEALTH_URL: ${STUDIO_VOICE_HTTP_HEALTH_URL:-http://localhost:8001/health}
  # ASR Service Configuration
  ASR_BASE_URL: ${ASR_BASE_URL:-http://localhost:8042}
  ASR_MODEL_SIZE: ${ASR_MODEL_SIZE:-large-v2}
  ASR_TIMEOUT_SECONDS: ${ASR_TIMEOUT_SECONDS:-300}
  ASR_MAX_ATTEMPTS: ${ASR_MAX_ATTEMPTS:-1}
  ASR_ENABLED: ${ASR_ENABLED:-true}
  # ACE-Step music
  ACESTEP_BASE_URL: ${ACESTEP_BASE_URL:-http://host.docker.internal:8015}
  MUSIC_ENABLED: ${MUSIC_ENABLED:-false}
  # LTX-2 video clips
  LTX_BASE_URL: ${LTX_BASE_URL:-http://host.docker.internal:8023}
  VIDEO_ENABLED: ${VIDEO_ENABLED:-false}
  VIDEO_CLIPS_PER_SEGMENT: ${VIDEO_CLIPS_PER_SEGMENT:-2}
  LTX_MAX_NATIVE_SECONDS: ${LTX_MAX_NATIVE_SECONDS:-3.5}
  LTX_MAX_STRETCH: ${LTX_MAX_STRETCH:-1.4}
  LTX_RETRIES: ${LTX_RETRIES:-2}
  LTX_INTERP_MODE: ${LTX_INTERP_MODE:-blend}
  # TTS backend selection + Magpie voices
  TTS_BACKEND: ${TTS_BACKEND:-magpie}
  MAGPIE_S1_VOICE: ${MAGPIE_S1_VOICE:-Magpie-Multilingual.EN-US.Mia}
  MAGPIE_S2_VOICE: ${MAGPIE_S2_VOICE:-Magpie-Multilingual.EN-US.Jason}
  STUDIO_VOICE_ENABLED: ${STUDIO_VOICE_ENABLED:-false}
  # Outputs (set both to avoid OUTPUTS_DIR/OUTPUTS_ROOT split)
  OUTPUTS_DIR: ${OUTPUTS_DIR:-/app/outputs}
  OUTPUTS_ROOT: ${OUTPUTS_ROOT:-/app/outputs}
  # Local LLM Configuration
  LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:1234/v1}
  LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-20b}
  LLM_PROVIDER: ${LLM_PROVIDER:-local}
  # Firecrawl Configuration
  FIRECRAWL_BASE_URL: ${FIRECRAWL_BASE_URL:-http://localhost:3002}
  # Source images (real images from the scraped article)
  SOURCE_IMAGES_ENABLED: ${SOURCE_IMAGES_ENABLED:-false}
  SOURCE_IMAGES_TOP_N: ${SOURCE_IMAGES_TOP_N:-4}
  # Hacker News Configuration
  HN_USER_AGENT: ${HN_USER_AGENT:-hn.fm/0.1.0 (briancaffey)}
  # Content Configuration
  MAX_EPISODE_LENGTH: ${MAX_EPISODE_LENGTH:-15}
  INCLUDE_COMMENTS: ${INCLUDE_COMMENTS:-true}
  QUALITY_THRESHOLD: ${QUALITY_THRESHOLD:-0.8}
  # Image Generation Configuration
  IMAGE_GENERATION_BACKEND: ${IMAGE_GENERATION_BACKEND:-NIM}
  IMAGE_GENERATION_BASE_URL: ${IMAGE_GENERATION_BASE_URL:-http://localhost:8000}
  # InvokeAI Configuration
  INVOKEAI_BASE_URL: ${INVOKEAI_BASE_URL:-http://localhost:9090}
  INVOKEAI_BOARD_ID: ${INVOKEAI_BOARD_ID:-}

services:
  # Redis service for Celery broker and result backend
  redis:
    image: redis:7-alpine
    container_name: hnfm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hnfm-network

  # RedisInsight for Redis monitoring and management
  redisinsight:
    image: redis/redisinsight:latest
    container_name: hnfm-redisinsight
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight_data:/data
    environment:
      - RI_APP_PORT=5540
      - RI_APP_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - hnfm-network

  # FastAPI web server with hot reloading
  web:
    <<: *common-app-config
    container_name: hnfm-web
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      WEB_RELOAD: "true"
    command: ["python", "src/hnfm/scripts/run_web_server.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery worker
  celery-worker:
    <<: *common-app-config
    container_name: hnfm-celery-worker
    environment:
      <<: *common-env
      CELERY_ALWAYS_EAGER: "false"
      CELERY_WORKER_CONCURRENCY: "1"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "1000"
      CELERY_TASK_SOFT_TIME_LIMIT: "300"
      CELERY_TASK_TIME_LIMIT: "600"
    command: ["celery", "-A", "src.hnfm.web.celery_app:celery_app", "worker", "--loglevel=info", "--queues=hnfm_tasks"]
    healthcheck:
      test: ["CMD", "celery", "-A", "src.hnfm.web.celery_app:celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Beat
  celery-beat:
    <<: *common-app-config
    container_name: hnfm-celery-beat
    environment:
      <<: *common-env
      PIDFILE: "/tmp/celerybeat.pid"
    command: ["celery", "-A", "src.hnfm.web.celery_app:celery_app", "beat", "--loglevel=info"]
    healthcheck:
      test: ["CMD", "celery", "-A", "src.hnfm.web.celery_app:celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Flower monitoring
  flower:
    image: mher/flower:2.0.1
    container_name: hnfm-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BROKER_API=redis://redis:6379/0
      - FLOWER_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_BROKER_API_REDIS_HOST=redis
      - FLOWER_BROKER_API_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hnfm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jupyter Lab for interactive development
  jupyter:
    <<: *common-app-config
    container_name: hnfm-jupyter
    ports:
      - "8888:8888"
    environment:
      <<: *common-env
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
    driver: local
  redisinsight_data:
    driver: local

networks:
  hnfm-network:
    driver: bridge
