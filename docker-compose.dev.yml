# Development override for hot reloading and development features

# Development override for hot reloading and development features
services:
  web:
    volumes:
      - ./src:/app/src  # Mount source code for hot reloading
      - ./outputs:/app/outputs
      - ./cache:/app/cache
    environment:
      - DEBUG=true
      - WEB_RELOAD=true
      - LOG_LEVEL=DEBUG
    command: ["python", "run_web_server.py"]
    # Enable hot reloading by mounting source code and setting reload flag

  celery-worker:
    volumes:
      - ./src:/app/src  # Mount source code for hot reloading
      - ./outputs:/app/outputs
      - ./cache:/app/cache
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    # Restart on code changes for development

  celery-beat:
    volumes:
      - ./src:/app/src  # Mount source code for hot reloading
      - ./outputs:/app/outputs
      - ./cache:/app/cache
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    # Restart on code changes for development

  # Development tools
  flower:
    ports:
      - "5555:5555"
    environment:
      - FLOWER_BROKER_API=redis://redis:6379/0
      - FLOWER_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BROKER_API_REDIS_HOST=redis
      - FLOWER_BROKER_API_REDIS_PORT=6379
