# hn.fm Pipeline Configuration

# Voice Configuration
voice:
  default: "notebooklm"
  available_voices:
    - "notebooklm"
    - "studio_voice"

# TTS Service Configuration
tts:
  base_url: "${TTS_BASE_URL}"
  default_voice: "${TTS_DEFAULT_VOICE}"
  batch_size: 3
  max_attempts: 3
  delay_between_batches: 1  # seconds

# Studio Voice Configuration (NVIDIA NIM)
studio_voice:
  enabled: true
  target: "${STUDIO_VOICE_TARGET}"
  model_type: "${STUDIO_VOICE_MODEL_TYPE}"
  http_health_url: "${STUDIO_VOICE_HTTP_HEALTH_URL}"
  streaming: false
  ssl_mode: null
  sample_rate: 48000

# Local LLM Configuration (LM Studio)
# Successfully connected to local gpt-oss model via LM Studio
llm:
  enabled: true
  base_url: "${LLM_BASE_URL}"  # Primary endpoint
  model: "${LLM_MODEL}"
  provider: "local"

# Content Processing Configuration
content:
  max_episode_length: 15
  include_comments: true
  quality_threshold: 0.8
  max_paragraphs: 10

# Pipeline Configuration
pipeline:
  # Steps that can be skipped (using cached data)
  skippable_steps:
    - "system_check"
    - "hn_scraping"
    - "firecrawl_content"
    - "content_processing"
    - "script_generation"
    - "image_generation"
    - "tts_generation"
    - "audio_cleaning"
    - "audio_assembly"
    - "asr_processing"
    - "video_generation"

  # Cache configuration
  cache:
    enabled: true
    directory: "cache"
    expiration_hours: 24

# Output Configuration
output:
  base_directory: "outputs"
  organize_by_story: true
  keep_intermediate_files: true
  audio_format: "wav"
  audio_quality: "high"

# API Configuration
apis:
  firecrawl:
    base_url: "${FIRECRAWL_BASE_URL}"
    api_key: "${FIRECRAWL_API_KEY}"

  openai:
    api_key: "${OPENAI_API_KEY}"

  hn:
    user_agent: "hn.fm/0.1.0 (briancaffey)"

# ASR Service Configuration (WhisperX)
asr:
  base_url: "${ASR_BASE_URL}"
  model_size: "${ASR_MODEL_SIZE}"
  min_speakers: 2
  max_speakers: 2

# Image Generation Service Configuration
image_generation:
  backend: "${IMAGE_GENERATION_BACKEND}"  # "NIM" or "INVOKEAI"
  base_url: "${IMAGE_GENERATION_BASE_URL}"
  default_height: 720
  default_width: 1280
  default_cfg_scale: 1.0
  default_mode: "base"
  default_steps: 50
  default_samples: 1
  output_directory: "images"
  default_style: "detailed cartoon style"
  timeout_seconds: 1800  # 30 minutes timeout for image generation
  # InvokeAI specific configuration
  invokeai:
    base_url: "${INVOKEAI_BASE_URL}"
    board_id: "${INVOKEAI_BOARD_ID}"

# Development Configuration
development:
  debug: false
  log_level: "INFO"
  enable_progress_bars: true
  parallel_processing: false
